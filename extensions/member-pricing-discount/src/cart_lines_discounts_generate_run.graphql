query CartInput {
  cart {
    buyerIdentity {
      isAuthenticated
    }
    lines {
      id
      quantity
      cost {
        amountPerQuantity {
          amount
        }
      }
      merchandise {
        __typename
        ... on ProductVariant {
          appMemberPrice: metafield(namespace: "$app", key: "member_price") {
            jsonValue
          }
          customMemberPrice: metafield(
            namespace: "custom"
            key: "variant_member_price"
          ) {
            jsonValue
          }
          product {
            appMemberPrice: metafield(namespace: "$app", key: "member_price") {
              jsonValue
            }
            customMemberPrice: metafield(
              namespace: "custom"
              key: "member_price"
            ) {
              jsonValue
            }
          }
        }
      }
    }
  }
  discount {
    discountClasses
    metafield(namespace: "$app", key: "membership_config") {
      jsonValue
    }
  }
}
