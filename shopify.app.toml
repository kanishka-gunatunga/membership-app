# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = ""
name = "MemberPro"
application_url = "https://memberpro.ktcloud365.com"
embedded = true

[access_scopes]
scopes = "read_metaobjects,write_metaobjects,write_metaobject_definitions,read_products,write_products,write_discounts,read_themes"
use_legacy_install_flow = false

[shop.metafields.app.storefront_config]
type = "json"
name = "MemberPro storefront config"
description = "Storefront pricing settings synced from MemberPro"
access.admin = "merchant_read_write"
access.storefront = "public_read"

[product.metafields.app.member_price]
type = "money"
name = "Member price"
description = "Special price for logged-in members (Level 1). Leave empty to use variant price."
access.admin = "merchant_read_write"
access.storefront = "public_read"

[variant.metafields.app.member_price]
type = "money"
name = "Member price"
description = "Overrides product member price for this variant."
access.admin = "merchant_read_write"
access.storefront = "public_read"

[product.metafields.app.campaign]
type = "boolean"
name = "Campaign"
description = "When enabled, RRP is shown with a strikethrough."
access.admin = "merchant_read_write"
access.storefront = "public_read"

[metaobjects.app.membership_config]
name = "Membership Config"
description = "Global membership pricing settings for the shop"
display_name_field = "title"

  [metaobjects.app.membership_config.access]
  admin = "merchant_read_write"
  storefront = "public_read"

[metaobjects.app.membership_config.fields.title]
name = "Title"
type = "single_line_text_field"
required = true

[metaobjects.app.membership_config.fields.enabled]
name = "Membership pricing enabled"
type = "boolean"

[metaobjects.app.membership_config.fields.member_label]
name = "Member label"
type = "single_line_text_field"

[metaobjects.app.membership_config.fields.savings_label]
name = "Savings label"
type = "single_line_text_field"

[metaobjects.app.membership_config.fields.metafield_source]
name = "Metafield source"
type = "single_line_text_field"

[metaobjects.app.membership_config.fields.linked_product_member_price]
name = "Linked product member price"
type = "single_line_text_field"

[metaobjects.app.membership_config.fields.linked_variant_member_price]
name = "Linked variant member price"
type = "single_line_text_field"

[metaobjects.app.membership_config.fields.linked_campaign]
name = "Linked campaign field"
type = "single_line_text_field"

[discount.metafields.app.membership_config]
type = "json"
name = "Membership function config"
access.admin = "merchant_read_write"
access.storefront = "none"

[webhooks]
api_version = "2026-04"

  [[webhooks.subscriptions]]
  compliance_topics = ["customers/data_request", "customers/redact", "shop/redact"]
  uri = "/webhooks/compliance"

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/uninstalled"
  topics = ["app/uninstalled"]

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/scopes_update"
  topics = ["app/scopes_update"]

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/subscriptions_update"
  topics = ["app_subscriptions/update"]

  # orders/paid requires Protected Customer Data approval in Partner Dashboard.
  # [[webhooks.subscriptions]]
  # uri = "/webhooks/orders/paid"
  # topics = ["orders/paid"]

[auth]
redirect_urls = [
  "https://memberpro.ktcloud365.com/auth/callback",
  "https://memberpro.ktcloud365.com/auth/shopify/callback",
  "https://memberpro.ktcloud365.com/api/auth/callback"
]

[app_proxy]
url = "https://memberpro.ktcloud365.com"
subpath = "membership-pricing"
prefix = "apps"

[build]
automatically_update_urls_on_dev = false
